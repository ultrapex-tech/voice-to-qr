<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice to QR</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* --- Base Variables & Reset --- */
    :root {
      --primary: #4f46e5; --primary-hover: #4338ca;
      --secondary: #0ea5e9; --secondary-hover: #0284c7;
      --danger: #ef4444; --danger-hover: #dc2626;
      --success: #16a34a; --success-hover: #15803d;
      --dark: #111827; --dark-hover: #1f2937;
      --bg-gradient-start: #eef2ff; --bg-gradient-mid: #faf5ff; --bg-gradient-end: #fdf2f8;
      --text-main: #374151; --text-muted: #6b7280; --border-color: #e5e7eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-mid), var(--bg-gradient-end));
      display: flex; align-items: center; justify-content: center; padding: 1rem; color: var(--text-main);
    }
    .container { max-width: 1000px; width: 100%; display: grid; grid-template-columns: 1fr; gap: 2rem; }
    @media (min-width: 992px) { .container { grid-template-columns: 1fr 1fr; } }
    .card {
      background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-radius: 1.5rem;
      padding: 2rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border: 1px solid rgba(255, 255, 255, 0.5);
      display: flex; flex-direction: column;
    }
    .card-right { background: rgba(255, 255, 255, 0.6); align-items: center; justify-content: center; min-height: 400px; }
    .header { margin-bottom: 1.5rem; }
    .title {
      font-size: 2rem; font-weight: 800; letter-spacing: -0.025em; margin-bottom: 0.5rem;
      background: linear-gradient(to right, #4f46e5, #9333ea); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 0.5rem;
    }
    .subtitle { color: var(--text-muted); line-height: 1.5; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
    .lang-select {
      padding: 0.5rem 1rem; border-radius: 0.75rem; border: 1px solid var(--border-color);
      background-color: white; color: var(--text-main); font-weight: 500; font-size: 0.875rem; cursor: pointer; outline: none;
    }
    .lang-select:focus { border-color: var(--primary); }
    .error-box {
      background-color: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; padding: 1rem; border-radius: 1rem;
      display: flex; gap: 0.75rem; align-items: flex-start; margin-bottom: 1.5rem; font-size: 0.875rem; font-weight: 500;
    }
    .error-box.hidden { display: none; }
    .input-wrapper { position: relative; flex: 1; display: flex; flex-direction: column; margin-bottom: 1.5rem; }
    textarea {
      flex: 1; width: 100%; min-height: 200px; padding: 1.25rem; border-radius: 1rem; border: 1px solid var(--border-color);
      font-size: 1.125rem; line-height: 1.6; resize: none; font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #a855f7; box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2); }
    .recording-indicator {
      position: absolute; top: 1rem; right: 1rem; background: #fee2e2; color: #dc2626;
      padding: 0.375rem 0.75rem; border-radius: 999px; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem;
    }
    .recording-indicator .dot { width: 8px; height: 8px; background-color: #dc2626; border-radius: 50%; animation: pulse 2s infinite; }
    .recording-indicator.hidden { display: none; }
    .controls { display: grid; grid-template-columns: 1fr auto; gap: 0.75rem; width: 100%; }
    button { border: none; background: none; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-translate { height: 60px; background-color: var(--secondary); color: white; border-radius: 1rem; font-size: 1rem; font-weight: 700; gap: 0.5rem; }
    .btn-translate:hover:not(:disabled) { background-color: var(--secondary-hover); }
    .btn-mic { position: relative; width: 60px; height: 60px; border-radius: 50%; background-color: var(--primary); color: white; }
    .btn-mic:hover:not(:disabled) { background-color: var(--primary-hover); transform: scale(1.05); }
    .btn-mic.is-recording { background-color: var(--danger); }
    .btn-mic.is-recording:hover { background-color: var(--danger-hover); }
    .mic-ping { position: absolute; inset: 0; border-radius: 50%; border: 4px solid var(--danger); opacity: 0; pointer-events: none; }
    .btn-mic.is-recording .mic-ping { animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite; }
    .btn-generate { height: 60px; background-color: var(--dark); color: white; border-radius: 1rem; font-size: 1rem; font-weight: 700; gap: 0.5rem; }
    .btn-generate:hover:not(:disabled) { background-color: var(--dark-hover); }
    .btn-clear { width: 60px; height: 60px; background-color: white; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 1rem; }
    .btn-clear:hover:not(:disabled) { background-color: #fef2f2; color: var(--danger); border-color: #fca5a5; }
    .hidden { display: none !important; }
    .qr-result { display: flex; flex-direction: column; align-items: center; width: 100%; animation: fadeIn 0.4s ease-out; }
    .qr-box { background: white; padding: 1.5rem; border-radius: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); border: 1px solid #f3f4f6; margin-bottom: 1.5rem; }
    .qr-image { width: 256px; height: 256px; object-fit: contain; }
    .action-buttons { display: flex; gap: 0.75rem; width: 100%; max-width: 320px; margin-bottom: 1rem; }
    .btn-download { flex: 1; background-color: #e0e7ff; color: #4338ca; padding: 0.75rem; border-radius: 1rem; font-weight: 700; font-size: 0.875rem; gap: 0.5rem; border: 1px solid #c7d2fe; }
    .btn-download:hover { background-color: #c7d2fe; }
    .btn-share { flex: 1; background-color: #dcfce7; color: #15803d; padding: 0.75rem; border-radius: 1rem; font-weight: 700; font-size: 0.875rem; gap: 0.5rem; border: 1px solid #bbf7d0; }
    .btn-share:hover { background-color: #bbf7d0; }
    .qr-caption { color: var(--text-muted); font-size: 0.875rem; text-align: center; max-width: 250px; line-height: 1.4; }
    .qr-placeholder { display: flex; flex-direction: column; align-items: center; opacity: 0.4; }
    .qr-placeholder i { width: 128px; height: 128px; color: var(--text-muted); margin-bottom: 1.5rem; }
    .qr-placeholder p { font-weight: 500; font-size: 1.125rem; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    @keyframes ping { 0% { transform: scale(0.8); opacity: 0.8; } 75%, 100% { transform: scale(1.4); opacity: 0; } }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1 class="title">Voice to QR</h1>
        <p class="subtitle">Speak in any language, and generate an English-only scanner-friendly QR code.</p>
      </div>

      <div class="top-bar">
        <span style="font-size: 0.875rem; font-weight: 600; color: var(--text-muted);">Spoken Language:</span>
        <select id="lang-select" class="lang-select">
          <option value="en-US">English (US)</option>
          <option value="zh-CN">Chinese (Simplified 简体)</option>
          <option value="zh-HK">Chinese (Cantonese 粵語)</option>
          <option value="zh-TW">Chinese (Traditional 繁體)</option>
        </select>
      </div>

      <div id="error-box" class="error-box hidden">
        <i data-lucide="alert-circle"></i>
        <p id="error-text"></p>
      </div>

      <div class="input-wrapper">
        <textarea id="text-input" placeholder="Tap the microphone and start speaking, or type your text here..."></textarea>
        <div id="recording-indicator" class="recording-indicator hidden">
          <div class="dot"></div>RECORDING
        </div>
      </div>

      <div class="controls">
        <button id="translate-btn" class="btn-translate" title="Preview English Translation">
          <i data-lucide="languages"></i> To English
        </button>
        
        <button id="mic-btn" class="btn-mic" title="Start Recording">
          <span id="icon-mic"><i data-lucide="mic"></i></span>
          <span id="icon-mic-off" class="hidden"><i data-lucide="mic-off"></i></span>
          <span class="mic-ping"></span>
        </button>

        <button id="generate-btn" class="btn-generate" title="Auto-translate to English and generate QR">
          <i data-lucide="qr-code"></i> Create English QR
        </button>
        <button id="clear-btn" class="btn-clear" title="Clear Everything">
          <i data-lucide="trash-2"></i>
        </button>
      </div>
    </div>

    <div class="card card-right">
      <div id="qr-result" class="qr-result hidden">
        <div class="qr-box">
          <img id="qr-image" crossorigin="anonymous" src="" alt="Generated QR Code" class="qr-image"/>
        </div>
        
        <div class="action-buttons">
          <button id="download-btn" class="btn-download" title="Downloads Single Combined Image">
            <i data-lucide="image-down"></i> Save Image
          </button>
          <button id="share-btn" class="btn-share" title="Share Combined Image">
            <i data-lucide="share-2"></i> Share Image
          </button>
        </div>

        <p class="qr-caption">Downloads and shares will combine both the QR code and the translated text into a single image.</p>
      </div>

      <div id="qr-placeholder" class="qr-placeholder">
        <i data-lucide="qr-code"></i>
        <p>Your QR code will appear here</p>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    // Elements
    const textArea = document.getElementById('text-input');
    const langSelect = document.getElementById('lang-select');
    const micBtn = document.getElementById('mic-btn');
    const iconMic = document.getElementById('icon-mic');
    const iconMicOff = document.getElementById('icon-mic-off');
    const recordingIndicator = document.getElementById('recording-indicator');
    const translateBtn = document.getElementById('translate-btn');
    const generateBtn = document.getElementById('generate-btn');
    const clearBtn = document.getElementById('clear-btn');
    const downloadBtn = document.getElementById('download-btn');
    const shareBtn = document.getElementById('share-btn');
    const qrResult = document.getElementById('qr-result');
    const qrPlaceholder = document.getElementById('qr-placeholder');
    const qrImage = document.getElementById('qr-image');
    const errorBox = document.getElementById('error-box');
    const errorText = document.getElementById('error-text');

    // Your Google Apps Script Web App URL
    const GAS_BACKEND_URL = "https://script.google.com/macros/s/AKfycbx92-VcS0HEe8I6nC8F0QQziBfgBjuFogpu8gfxj-LoNSXQsEsJhGxZSNSpkTFtRVU8/exec";

    let isRecording = false;
    let mediaRecorder;
    let audioChunks = [];
    let currentQrUrl = '';

    function showError(msg) {
      if (msg) {
        errorText.textContent = msg;
        errorBox.classList.remove('hidden');
      } else {
        errorBox.classList.add('hidden');
      }
    }

    function updateMicUI() {
      if (isRecording) {
        micBtn.classList.add('is-recording');
        iconMic.classList.add('hidden');
        iconMicOff.classList.remove('hidden');
        recordingIndicator.classList.remove('hidden');
      } else {
        micBtn.classList.remove('is-recording');
        iconMic.classList.remove('hidden');
        iconMicOff.classList.add('hidden');
        recordingIndicator.classList.add('hidden');
      }
    }

    // --- Google Cloud Speech-to-Text Recording Logic ---
    async function startRecording() {
      try {
        showError('');
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = (event) => {
          audioChunks.push(event.data);
        };

        mediaRecorder.onstop = async () => {
          // Show loading state on mic button while waiting for Google Cloud
          micBtn.disabled = true;
          micBtn.innerHTML = '<i data-lucide="loader" class="animate-spin"></i>';
          lucide.createIcons();

          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          const reader = new FileReader();
          
          reader.readAsDataURL(audioBlob);
          reader.onloadend = async () => {
            const base64Audio = reader.result.split(',')[1]; 
            await sendAudioToGAS(base64Audio);
          };
        };

        mediaRecorder.start();
        isRecording = true;
        updateMicUI();

      } catch (err) {
        showError("Microphone access denied. Please allow permissions.");
        console.error(err);
      }
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        isRecording = false;
        updateMicUI();
      }
    }

    async function sendAudioToGAS(base64Audio) {
      try {
        const response = await fetch(GAS_BACKEND_URL, {
          method: "POST",
          body: JSON.stringify({
            audio: base64Audio,
            language: langSelect.value 
          })
        });

        const data = await response.json();
        
        if (data.success) {
          // Append the highly accurate medical transcript to the text area
          const newText = data.text;
          textArea.value = textArea.value + (textArea.value ? ' ' : '') + newText;
        } else {
          showError("Backend error: " + data.error);
        }
      } catch (error) {
        showError("Failed to connect to backend server.");
      } finally {
        // Reset the mic button back to normal
        micBtn.disabled = false;
        micBtn.innerHTML = '<span id="icon-mic"><i data-lucide="mic"></i></span><span id="icon-mic-off" class="hidden"><i data-lucide="mic-off"></i></span><span class="mic-ping"></span>';
        lucide.createIcons();
      }
    }

    micBtn.addEventListener('click', () => {
      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    });

    // --- Translation & QR Logic ---
    async function translateToEnglish(text) {
      const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=' + encodeURIComponent(text);
      const response = await fetch(url);
      const data = await response.json();
      return data[0].map(item => item[0]).join('');
    }

    generateBtn.addEventListener('click', async () => {
      const textToProcess = textArea.value.trim();
      if (!textToProcess) { showError("Please enter text first."); return; }
      
      showError('');
      generateBtn.disabled = true;
      generateBtn.innerHTML = '<i data-lucide="loader" class="animate-spin"></i> Generating...';
      lucide.createIcons();

      try {
        const englishText = await translateToEnglish(textToProcess);
        textArea.value = englishText;

        const formattedText = englishText.replace(/\r?\n/g, '\r\n');
        
        currentQrUrl = 'https://quickchart.io/qr?size=300&margin=1&text=' + encodeURIComponent(formattedText);
        
        qrImage.src = currentQrUrl;
        qrPlaceholder.classList.add('hidden');
        qrResult.classList.remove('hidden');
      } catch (err) {
        showError("Failed to translate or generate QR.");
      } finally {
        generateBtn.disabled = false;
        generateBtn.innerHTML = '<i data-lucide="qr-code"></i> Create English QR';
        lucide.createIcons();
      }
    });

    translateBtn.addEventListener('click', async () => {
      const textToTranslate = textArea.value.trim();
      if (!textToTranslate) { showError("Please enter some text."); return; }
      
      showError('');
      translateBtn.disabled = true;
      translateBtn.innerHTML = '<i data-lucide="loader" class="animate-spin"></i> Translating...';
      lucide.createIcons();

      try {
        const translatedText = await translateToEnglish(textToTranslate);
        textArea.value = translatedText;
      } catch (err) {
        showError("Translation failed.");
      } finally {
        translateBtn.disabled = false;
        translateBtn.innerHTML = '<i data-lucide="languages"></i> To English';
        lucide.createIcons();
      }
    });

    clearBtn.addEventListener('click', () => {
      textArea.value = ''; currentQrUrl = ''; qrImage.src = '';
      qrPlaceholder.classList.remove('hidden'); qrResult.classList.add('hidden'); showError('');
      if (isRecording) stopRecording();
    });

    // --- Canvas Stitching Logic (Unchanged) ---
    function getCombinedCanvas() {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      
      const qrSize = 300;
      const padding = 20;
      const fontSize = 16;
      const lineHeight = 24;
      const textToDraw = textArea.value.trim();
      
      ctx.font = fontSize + 'px system-ui, sans-serif';
      const words = textToDraw.split(' ');
      let line = '';
      let lines = [];
      const maxWidth = qrSize; 
      
      for(let i = 0; i < words.length; i++) {
        let testLine = line + words[i] + ' ';
        let metrics = ctx.measureText(testLine);
        if(metrics.width > maxWidth && i > 0) {
          lines.push(line);
          line = words[i] + ' ';
        } else {
          line = testLine;
        }
      }
      lines.push(line);
      
      const textHeight = lines.length * lineHeight;
      
      canvas.width = qrSize + (padding * 2);
      canvas.height = qrSize + (padding * 2) + textHeight + padding; 
      
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.drawImage(qrImage, padding, padding, qrSize, qrSize);
      
      ctx.fillStyle = '#111827';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      let yPosition = qrSize + (padding * 2);
      
      for(let i = 0; i < lines.length; i++) {
        ctx.fillText(lines[i], canvas.width / 2, yPosition);
        yPosition += lineHeight;
      }
      
      return canvas;
    }

    downloadBtn.addEventListener('click', () => {
      if (!currentQrUrl || !qrImage.complete) return;
      try {
        const canvas = getCombinedCanvas();
        const combinedDataUrl = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.href = combinedDataUrl;
        link.download = 'voice-qr-combined.png';
        document.body.appendChild(link); 
        link.click(); 
        document.body.removeChild(link);
      } catch (err) {
        showError("Could not generate combined image. Try again.");
      }
    });

    shareBtn.addEventListener('click', async () => {
      if (!currentQrUrl || !qrImage.complete) { showError("Please generate a QR code first."); return; }
      try {
        const canvas = getCombinedCanvas();
        canvas.toBlob(async (blob) => {
          const file = new File([blob], 'voice-qr-combined.png', { type: 'image/png' });
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try { await navigator.share({ files: [file], title: 'Translated Voice QR' }); } catch (err) {}
          } else {
            alert("Your browser doesn't support direct image sharing. The image will download, and WhatsApp will open!");
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'voice-qr-combined.png';
            link.click();
            const textToShare = textArea.value.trim();
            window.open('https://api.whatsapp.com/send?text=' + encodeURIComponent(textToShare), '_blank');
          }
        }, 'image/png');
      } catch (err) { showError("Failed to prepare image for sharing."); }
    });
  </script>
</body>
</html>
