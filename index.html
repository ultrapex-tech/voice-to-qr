<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice & Scan to QR</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --primary: #4f46e5; --primary-hover: #4338ca;
      --secondary: #0ea5e9; --secondary-hover: #0284c7;
      --medical: #9333ea; --medical-hover: #7e22ce;
      --camera: #f97316; --camera-hover: #ea580c;
      --danger: #ef4444; --danger-hover: #dc2626;
      --dark: #111827; --dark-hover: #1f2937;
      --bg-gradient-start: #eef2ff; --bg-gradient-mid: #faf5ff; --bg-gradient-end: #fdf2f8;
      --text-main: #374151; --text-muted: #6b7280; --border-color: #e5e7eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; min-height: 100vh; background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-mid), var(--bg-gradient-end)); display: flex; align-items: center; justify-content: center; padding: 1rem; color: var(--text-main); }
    .container { max-width: 1000px; width: 100%; display: grid; grid-template-columns: 1fr; gap: 2rem; }
    @media (min-width: 992px) { .container { grid-template-columns: 1fr 1fr; } }
    
    .card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-radius: 1.5rem; padding: 2rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border: 1px solid rgba(255, 255, 255, 0.5); display: flex; flex-direction: column; }
    .card-right { background: rgba(255, 255, 255, 0.6); align-items: center; justify-content: center; min-height: 400px; }
    
    .header { margin-bottom: 1.5rem; }
    .title { font-size: 2rem; font-weight: 800; letter-spacing: -0.025em; margin-bottom: 0.5rem; background: linear-gradient(to right, #4f46e5, #9333ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 0.5rem; }
    .subtitle { color: var(--text-muted); line-height: 1.5; }
    
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
    .lang-select { padding: 0.5rem 1rem; border-radius: 0.75rem; border: 1px solid var(--border-color); background-color: white; color: var(--text-main); font-weight: 500; font-size: 0.875rem; cursor: pointer; outline: none; }
    .lang-select:focus { border-color: var(--primary); }
    
    .error-box { background-color: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; padding: 1rem; border-radius: 1rem; display: flex; gap: 0.75rem; align-items: flex-start; margin-bottom: 1.5rem; font-size: 0.875rem; font-weight: 500; }
    
    .medical-banner { background-color: #faf5ff; border: 1px solid #e9d5ff; color: #7e22ce; padding: 1rem; border-radius: 1rem; display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1.5rem; font-size: 0.875rem; font-weight: 600; animation: fadeIn 0.3s ease-in-out; }
    .camera-banner { background-color: #fff7ed; border: 1px solid #ffedd5; color: #c2410c; padding: 1rem; border-radius: 1rem; display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1.5rem; font-size: 0.875rem; font-weight: 600; animation: fadeIn 0.3s ease-in-out; }
    
    .hidden { display: none !important; }
    
    .input-wrapper { position: relative; flex: 1; display: flex; flex-direction: column; margin-bottom: 1.5rem; }
    textarea { flex: 1; width: 100%; min-height: 200px; padding: 1.25rem; border-radius: 1rem; border: 1px solid var(--border-color); font-size: 1.125rem; line-height: 1.6; resize: none; font-family: inherit; transition: all 0.2s; }
    textarea:focus { outline: none; border-color: #a855f7; box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2); }
    
    .recording-indicator { position: absolute; top: 1rem; right: 1rem; background: #fee2e2; color: #dc2626; padding: 0.375rem 0.75rem; border-radius: 999px; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
    .recording-indicator .dot { width: 8px; height: 8px; background-color: #dc2626; border-radius: 50%; animation: pulse 2s infinite; }
    
    .controls { display: grid; grid-template-columns: 1fr auto auto auto; gap: 0.75rem; width: 100%; }
    
    button { border: none; background: none; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    button:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(70%); }
    
    .btn-translate { grid-column: 1; height: 60px; background-color: var(--secondary); color: white; border-radius: 1rem; font-size: 1rem; font-weight: 700; gap: 0.5rem; }
    .btn-translate:hover:not(:disabled) { background-color: var(--secondary-hover); }
    
    .btn-mic-daily { grid-column: 2; position: relative; width: 60px; height: 60px; border-radius: 50%; background-color: var(--primary); color: white; }
    .btn-mic-daily:hover:not(:disabled) { background-color: var(--primary-hover); transform: scale(1.05); }
    
    .btn-mic-medical { grid-column: 3; position: relative; width: 60px; height: 60px; border-radius: 50%; background-color: var(--medical); color: white; }
    .btn-mic-medical:hover:not(:disabled) { background-color: var(--medical-hover); transform: scale(1.05); }

    .btn-camera { grid-column: 4; position: relative; width: 60px; height: 60px; border-radius: 50%; background-color: var(--camera); color: white; }
    .btn-camera:hover:not(:disabled) { background-color: var(--camera-hover); transform: scale(1.05); }
    
    .is-recording { background-color: var(--danger) !important; box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.3); }
    .is-recording:hover { background-color: var(--danger-hover) !important; transform: scale(1.05); }
    .mic-ping { position: absolute; inset: 0; border-radius: 50%; border: 4px solid var(--danger); opacity: 0; pointer-events: none; }
    .is-recording .mic-ping { animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite; }
    
    .btn-generate { grid-column: 1 / span 3; height: 60px; background-color: var(--dark); color: white; border-radius: 1rem; font-size: 1rem; font-weight: 700; gap: 0.5rem; }
    .btn-generate:hover:not(:disabled) { background-color: var(--dark-hover); }
    
    .btn-clear { grid-column: 4; width: 60px; height: 60px; background-color: white; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 1rem; }
    .btn-clear:hover:not(:disabled) { background-color: #fef2f2; color: var(--danger); border-color: #fca5a5; }
    
    .qr-result { display: flex; flex-direction: column; align-items: center; width: 100%; animation: fadeIn 0.4s ease-out; }
    .qr-box { background: white; padding: 1.5rem; border-radius: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); border: 1px solid #f3f4f6; margin-bottom: 1.5rem; }
    .qr-image { width: 256px; height: 256px; object-fit: contain; }
    .action-buttons { display: flex; gap: 0.75rem; width: 100%; max-width: 320px; margin-bottom: 1rem; }
    .btn-download, .btn-share { flex: 1; padding: 0.75rem; border-radius: 1rem; font-weight: 700; font-size: 0.875rem; gap: 0.5rem; border: 1px solid; }
    .btn-download { background-color: #e0e7ff; color: #4338ca; border-color: #c7d2fe; } .btn-download:hover { background-color: #c7d2fe; }
    .btn-share { background-color: #dcfce7; color: #15803d; border-color: #bbf7d0; } .btn-share:hover { background-color: #bbf7d0; }
    .qr-caption { color: var(--text-muted); font-size: 0.875rem; text-align: center; max-width: 250px; line-height: 1.4; }
    .qr-placeholder { display: flex; flex-direction: column; align-items: center; opacity: 0.4; }
    .qr-placeholder i { width: 128px; height: 128px; margin-bottom: 1.5rem; }
    
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    @keyframes ping { 0% { transform: scale(0.8); opacity: 0.8; } 75%, 100% { transform: scale(1.4); opacity: 0; } }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-spin { animation: spin 1s linear infinite; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1 class="title">Voice & Scan to QR</h1>
        <p class="subtitle">Speak or scan a document, translate it, and generate a QR code.</p>
      </div>

      <div class="top-bar">
        <span style="font-size: 0.875rem; font-weight: 600; color: var(--text-muted);">Spoken Language:</span>
        <select id="lang-select" class="lang-select">
          <option value="en-US">English (US)</option>
          <option value="zh-CN">Chinese (Simplified 简体)</option>
          <option value="zh-HK">Chinese (Cantonese 粵語)</option>
          <option value="zh-TW">Chinese (Traditional 繁體)</option>
        </select>
      </div>

      <div id="error-box" class="error-box hidden"><i data-lucide="alert-circle"></i><p id="error-text"></p></div>
      
      <div id="medical-banner" class="medical-banner hidden">
        <i data-lucide="activity" class="animate-pulse"></i>
        <div><span id="banner-title">Medical transcription active.</span><br><span style="font-size: 0.75rem; font-weight: normal;">Text will generate automatically when you press stop.</span></div>
      </div>

      <div id="camera-banner" class="camera-banner hidden">
        <i data-lucide="loader" class="animate-spin"></i>
        <div><span>Scanning document...</span><br><span style="font-size: 0.75rem; font-weight: normal;">Extracting text from your image. Please wait.</span></div>
      </div>

      <div class="input-wrapper">
        <textarea id="text-input" placeholder="Tap a mic, scan a document, or type your text here..."></textarea>
        <div id="recording-indicator" class="recording-indicator hidden"><div class="dot"></div><span id="recording-text">RECORDING</span></div>
      </div>

      <div class="controls">
        <button id="translate-btn" class="btn-translate" title="Preview English Translation"><i data-lucide="languages"></i> To English</button>
        
        <button id="daily-mic-btn" class="btn-mic-daily" title="Daily Mic (Live Typing)">
          <span id="icon-daily-mic"><i data-lucide="mic"></i></span><span id="icon-daily-stop" class="hidden"><i data-lucide="square"></i></span><span class="mic-ping"></span>
        </button>

        <button id="google-mic-btn" class="btn-mic-medical" title="Google Medical Cloud">
          <span id="icon-google-mic"><i data-lucide="stethoscope"></i></span><span id="icon-google-stop" class="hidden"><i data-lucide="square"></i></span><span class="mic-ping"></span>
        </button>

        <button id="camera-btn" class="btn-camera" title="Scan Document / Photo">
          <i data-lucide="camera"></i>
        </button>
        <input type="file" id="image-upload" accept="image/*" class="hidden" capture="environment">

        <button id="generate-btn" class="btn-generate" title="Auto-translate to English and generate QR"><i data-lucide="qr-code"></i> Create English QR</button>
        <button id="clear-btn" class="btn-clear" title="Clear Everything"><i data-lucide="trash-2"></i></button>
      </div>
    </div>

    <div class="card card-right">
      <div id="qr-result" class="qr-result hidden">
        <div class="qr-box"><img id="qr-image" crossorigin="anonymous" src="" class="qr-image"/></div>
        <div class="action-buttons">
          <button id="download-btn" class="btn-download"><i data-lucide="image-down"></i> Save</button>
          <button id="share-btn" class="btn-share"><i data-lucide="share-2"></i> Share</button>
        </div>
      </div>
      <div id="qr-placeholder" class="qr-placeholder"><i data-lucide="qr-code"></i><p>Your QR code will appear here</p></div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    const textArea = document.getElementById('text-input');
    const langSelect = document.getElementById('lang-select');
    
    // Buttons
    const dailyMicBtn = document.getElementById('daily-mic-btn');
    const googleMicBtn = document.getElementById('google-mic-btn');
    const cameraBtn = document.getElementById('camera-btn');
    const imageUpload = document.getElementById('image-upload');
    
    // Icons
    const iconDailyMic = document.getElementById('icon-daily-mic'); const iconDailyStop = document.getElementById('icon-daily-stop');
    const iconGoogleMic = document.getElementById('icon-google-mic'); const iconGoogleStop = document.getElementById('icon-google-stop');
    
    // UI Elements
    const recordingIndicator = document.getElementById('recording-indicator');
    const medicalBanner = document.getElementById('medical-banner');
    const cameraBanner = document.getElementById('camera-banner');
    const errorBox = document.getElementById('error-box'); const errorText = document.getElementById('error-text');

    // Make sure to use your LATEST Google Apps Script Web App URL here!
    const GAS_BACKEND_URL = "https://script.google.com/macros/s/AKfycbx92-VcS0HEe8I6nC8F0QQziBfgBjuFogpu8gfxj-LoNSXQsEsJhGxZSNSpkTFtRVU8/exec";
    
    let isDailyRecording = false; let isGoogleRecording = false;
    let finalText = ''; let currentQrUrl = '';
    let mediaRecorder; let audioChunks = [];

    function showError(msg) {
      if (msg) { errorText.textContent = msg; errorBox.classList.remove('hidden'); } 
      else { errorBox.classList.add('hidden'); }
    }

    textArea.addEventListener('input', (e) => { finalText = e.target.value; });

    function lockControls(exclude) {
      if(exclude !== 'daily') dailyMicBtn.disabled = true;
      if(exclude !== 'google') googleMicBtn.disabled = true;
      if(exclude !== 'camera') cameraBtn.disabled = true;
    }
    function unlockControls() {
      dailyMicBtn.disabled = false; googleMicBtn.disabled = false; cameraBtn.disabled = false;
    }

    // ==========================================
    // IMAGE UPLOAD & OCR LOGIC
    // ==========================================
    cameraBtn.addEventListener('click', () => {
      imageUpload.click(); // Trigger the hidden file input
    });

    imageUpload.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) return;

      showError('');
      lockControls('camera');
      cameraBtn.innerHTML = '<i data-lucide="loader" class="animate-spin"></i>';
      lucide.createIcons();
      cameraBanner.classList.remove('hidden');

      const reader = new FileReader();
      reader.onloadend = async () => {
        // Strip the data:image/jpeg;base64, prefix
        const base64Image = reader.result.split(',')[1];
        
        try {
          const response = await fetch(GAS_BACKEND_URL, {
            method: "POST",
            body: JSON.stringify({ action: "vision", image: base64Image })
          });
          
          const data = await response.json();
          if (data.success) {
            // Append the extracted text to the textarea
            finalText = finalText + (finalText ? '\n\n' : '') + data.text; 
            textArea.value = finalText;
          } else {
            showError("Vision Error: " + data.error);
          }
        } catch (error) {
          showError("Failed to connect to backend for image processing.");
        } finally {
          unlockControls();
          cameraBtn.innerHTML = '<i data-lucide="camera"></i>';
          lucide.createIcons();
          cameraBanner.classList.add('hidden');
          imageUpload.value = ''; // Reset file input so they can scan another
        }
      };
      reader.readAsDataURL(file);
    });

    // ==========================================
    // MICROPHONE 1: DAILY MIC (Web Speech API)
    // ==========================================
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    if (SpeechRecognition) {
      recognition = new SpeechRecognition(); recognition.continuous = true; recognition.interimResults = true;
      recognition.onstart = () => {
        isDailyRecording = true; lockControls('daily');
        dailyMicBtn.classList.add('is-recording'); iconDailyMic.classList.add('hidden'); iconDailyStop.classList.remove('hidden');
        recordingIndicator.classList.remove('hidden'); showError('');
      };
      recognition.onresult = (e) => {
        let finalChunk = ''; let interimChunk = '';
        for (let i = e.resultIndex; i < e.results.length; ++i) {
          if (e.results[i].isFinal) finalChunk += e.results[i][0].transcript + ' '; else interimChunk += e.results[i][0].transcript;
        }
        if (finalChunk) finalText += (finalText && !finalText.endsWith(' ') ? ' ' : '') + finalChunk;
        textArea.value = finalText + interimChunk;
      };
      recognition.onerror = (e) => { showError("Mic error: " + e.error); stopDailyMic(); };
      recognition.onend = () => stopDailyMic();
    } else { dailyMicBtn.style.display = 'none'; }

    function stopDailyMic() {
      isDailyRecording = false; unlockControls();
      dailyMicBtn.classList.remove('is-recording'); iconDailyMic.classList.remove('hidden'); iconDailyStop.classList.add('hidden');
      recordingIndicator.classList.add('hidden');
    }
    dailyMicBtn.addEventListener('click', () => {
      if (isDailyRecording) recognition.stop();
      else { recognition.lang = langSelect.value; try { recognition.start(); } catch (e) {} }
    });

    // ==========================================
    // MICROPHONE 2: GOOGLE CLOUD MIC
    // ==========================================
    async function startGoogleMic() {
      try {
        showError('');
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        let options = { mimeType: 'audio/webm' };
        if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) options = { mimeType: 'audio/webm;codecs=opus' };
        
        mediaRecorder = new MediaRecorder(stream, options);
        audioChunks = [];
        mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);

        mediaRecorder.onstop = async () => {
          googleMicBtn.disabled = true; googleMicBtn.innerHTML = '<i data-lucide="loader" class="animate-spin"></i>';
          lucide.createIcons();
          medicalBanner.innerHTML = `<i data-lucide="loader" class="animate-spin"></i> Analyzing with Google Cloud...`;

          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.readAsDataURL(audioBlob);
          reader.onloadend = async () => {
            const base64Audio = reader.result.split(',')[1]; 
            await sendAudioToGAS(base64Audio);
          };
        };

        mediaRecorder.start();
        lockControls('google');
        isGoogleRecording = true;
        
        googleMicBtn.classList.add('is-recording'); iconGoogleMic.classList.add('hidden'); iconGoogleStop.classList.remove('hidden');
        medicalBanner.innerHTML = '<i data-lucide="activity" class="animate-pulse"></i> <div><span id="banner-title">Medical transcription active.</span><br><span style="font-size: 0.75rem; font-weight: normal;">Text will generate automatically when you press stop.</span></div>';
        medicalBanner.classList.remove('hidden'); lucide.createIcons();

      } catch (err) { showError("Microphone access denied."); }
    }

    function stopGoogleMic() {
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        isGoogleRecording = false; 
        googleMicBtn.classList.remove('is-recording'); iconGoogleMic.classList.remove('hidden'); iconGoogleStop.classList.add('hidden');
      }
    }

    async function sendAudioToGAS(base64Audio) {
      try {
        const response = await fetch(GAS_BACKEND_URL, {
          method: "POST", body: JSON.stringify({ action: "speech", audio: base64Audio, language: langSelect.value })
        });
        const data = await response.json();
        if (data.success) {
          finalText = finalText + (finalText ? ' ' : '') + data.text; textArea.value = finalText;
        } else { showError("Backend error: " + data.error); }
      } catch (error) { showError("Failed to connect to backend server."); } 
      finally {
        googleMicBtn.innerHTML = '<span id="icon-google-mic"><i data-lucide="stethoscope"></i></span><span id="icon-google-stop" class="hidden"><i data-lucide="square"></i></span><span class="mic-ping"></span>';
        unlockControls(); medicalBanner.classList.add('hidden'); lucide.createIcons();
      }
    }

    googleMicBtn.addEventListener('click', () => {
      if (isGoogleRecording) stopGoogleMic(); else startGoogleMic();
    });

    // ==========================================
    // UTILS & CANVAS DRAWING
    // ==========================================
    async function translateToEnglish(text) {
      const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=' + encodeURIComponent(text);
      const response = await fetch(url); const data = await response.json(); return data[0].map(item => item[0]).join('');
    }

    document.getElementById('generate-btn').addEventListener('click', async () => {
      const textToProcess = textArea.value.trim();
      if (!textToProcess) { showError("Please enter text first."); return; }
      showError(''); document.getElementById('generate-btn').disabled = true;
      document.getElementById('generate-btn').innerHTML = '<i data-lucide="loader" class="animate-spin"></i> Generating...'; lucide.createIcons();

      try {
        const englishText = await translateToEnglish(textToProcess);
        textArea.value = englishText; finalText = englishText;
        currentQrUrl = 'https://quickchart.io/qr?size=300&margin=1&text=' + encodeURIComponent(englishText.replace(/\r?\n/g, '\r\n'));
        document.getElementById('qr-image').src = currentQrUrl;
        document.getElementById('qr-placeholder').classList.add('hidden'); document.getElementById('qr-result').classList.remove('hidden');
      } catch (err) { showError("Failed to translate or generate QR."); } 
      finally { document.getElementById('generate-btn').disabled = false; document.getElementById('generate-btn').innerHTML = '<i data-lucide="qr-code"></i> Create English QR'; lucide.createIcons(); }
    });

    document.getElementById('translate-btn').addEventListener('click', async () => {
      const textToTranslate = textArea.value.trim();
      if (!textToTranslate) { showError("Please enter some text."); return; }
      showError(''); document.getElementById('translate-btn').disabled = true;
      document.getElementById('translate-btn').innerHTML = '<i data-lucide="loader" class="animate-spin"></i> Translating...'; lucide.createIcons();

      try {
        const translatedText = await translateToEnglish(textToTranslate);
        textArea.value = translatedText; finalText = translatedText;
      } catch (err) { showError("Translation failed."); } 
      finally { document.getElementById('translate-btn').disabled = false; document.getElementById('translate-btn').innerHTML = '<i data-lucide="languages"></i> To English'; lucide.createIcons(); }
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      finalText = ''; textArea.value = ''; currentQrUrl = ''; document.getElementById('qr-image').src = '';
      document.getElementById('qr-placeholder').classList.remove('hidden'); document.getElementById('qr-result').classList.add('hidden'); showError('');
      if (isDailyRecording) recognition.stop();
      if (isGoogleRecording) stopGoogleMic();
    });

    function getCombinedCanvas() {
      const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
      const qrSize = 300; const padding = 20; const fontSize = 16; const lineHeight = 24; const textToDraw = textArea.value.trim();
      ctx.font = fontSize + 'px system-ui, sans-serif'; const words = textToDraw.split(' ');
      let line = ''; let lines = [];
      for(let i = 0; i < words.length; i++) {
        let testLine = line + words[i] + ' ';
        if(ctx.measureText(testLine).width > qrSize && i > 0) { lines.push(line); line = words[i] + ' '; } else line = testLine;
      }
      lines.push(line);
      canvas.width = qrSize + (padding * 2); canvas.height = qrSize + (padding * 2) + (lines.length * lineHeight) + padding; 
      ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(document.getElementById('qr-image'), padding, padding, qrSize, qrSize);
      ctx.fillStyle = '#111827'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      let yPosition = qrSize + (padding * 2);
      for(let i = 0; i < lines.length; i++) { ctx.fillText(lines[i], canvas.width / 2, yPosition); yPosition += lineHeight; }
      return canvas;
    }

    document.getElementById('download-btn').addEventListener('click', () => {
      if (!currentQrUrl || !document.getElementById('qr-image').complete) return;
      try {
        const link = document.createElement('a'); link.href = getCombinedCanvas().toDataURL('image/png');
        link.download = 'voice-qr-combined.png'; document.body.appendChild(link); link.click(); document.body.removeChild(link);
      } catch (err) { showError("Could not generate image."); }
    });

    document.getElementById('share-btn').addEventListener('click', async () => {
      if (!currentQrUrl || !document.getElementById('qr-image').complete) { showError("Generate a QR code first."); return; }
      try {
        getCombinedCanvas().toBlob(async (blob) => {
          const file = new File([blob], 'voice-qr-combined.png', { type: 'image/png' });
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try { await navigator.share({ files: [file], title: 'Translated Voice QR' }); } catch (err) {}
          } else {
            alert("Your browser doesn't support direct image sharing. The image will download, and WhatsApp will open!");
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = 'voice-qr-combined.png'; link.click();
            window.open('https://api.whatsapp.com/send?text=' + encodeURIComponent(textArea.value.trim()), '_blank');
          }
        }, 'image/png');
      } catch (err) { showError("Failed to prepare image for sharing."); }
    });
  </script>
</body>
</html>
